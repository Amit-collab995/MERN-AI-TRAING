<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table, Video, and Clickable Image</title>
</head>

<body>

  <h1>HTML Elements Example</h1>

  <!-- Table Section -->
  <h2>Student Table</h2>

  <table border="1" cellpadding="10">
    <tr>
      <th>Name</th>
      <th>Course</th>
      <th>City</th>
    </tr>

    <tr>
      <td>Amit Kumar</td>
      <td>MERN Stack</td>
      <td>Bihar</td>
    </tr>

    <tr>
      <td>Rahul</td>
      <td>Web Development</td>
      <td>Delhi</td>
    </tr>

    <tr>
      <td>Priya</td>
      <td>React JS</td>
      <td>Mumbai</td>
    </tr>
  </table>

  <hr>

  <!-- YouTube Video Section -->
  <h2>Embedded YouTube Video</h2>

  <iframe 
    width="560" 
    height="315" 
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    title="YouTube video player"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <hr>

  <!-- Clickable Image Section -->
  <h2>Clickable Image</h2>

  <a href="https://www.google.com" target="_blank">
    <img 
      src="https://via.placeholder.com/300"
      alt="Clickable Image"
      width="300"
    >
  </a>

  <p>Click the image to open Google.</p>

</body>
</html>
